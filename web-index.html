<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta name="theme-color" content="#202333" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <!-- iOS Safari: respect safe area so nav doesn't overlap status bar -->
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>Photo Healthy â€” Capture, Share, Thrive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html {
      height: auto;
      min-height: 100%;
    }
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: #202333;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      /* Prevent horizontal scroll */
      overflow-x: hidden;
    }
    #root {
      display: flex;
      flex-direction: column;
      width: 100%;
      min-width: 0;
      /* dvh = dynamic viewport height: shrinks when Safari URL bar is visible */
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      position: relative;
    }
    /* ===== iOS SCROLL FIX =====
       React Navigation creates nested overflow:hidden containers that trap scroll.
       We target the INNER screen content wrapper only - not the nav chrome.
       The strategy: nav bars stay fixed, content area gets -webkit-overflow-scrolling. 
    */
    /* Allow the main scroll container inside each screen to scroll on iOS */
    #root * {
      -webkit-overflow-scrolling: touch;
    }
    /* The stack card itself - make it fill height and allow its children to scroll */
    #root > div > div > div[data-focusable] {
      height: 100% !important;
      overflow: hidden !important;
    }
    /* Safe area for iOS notch + home indicator */
    body {
      padding-top: env(safe-area-inset-top, 0px);
      /* Do NOT pad body bottom - the tab bar handles it */
    }
    /* iOS Safari: push tab bar above the URL bar / home indicator */
    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      /* React Navigation tab bar container */
      #root > div > div > div > div:last-child {
        padding-bottom: env(safe-area-inset-bottom) !important;
      }
    }
    /* Prevent tap highlight on mobile */
    * { -webkit-tap-highlight-color: transparent; }
    /* Ensure text doesn't get too small on mobile */
    @media (max-width: 480px) {
      html { font-size: 17px; }
    }
    /* Scrollable horizontal lists look better on touch */
    /* Slim scrollbars site-wide - orange accent */
    ::-webkit-scrollbar { height: 5px; width: 5px; }
    ::-webkit-scrollbar-track { background: rgba(255,255,255,0.04); border-radius: 3px; }
    ::-webkit-scrollbar-thumb { background: rgba(245,91,9,0.45); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(245,91,9,0.75); }
    * { scrollbar-width: thin; scrollbar-color: rgba(245,91,9,0.45) rgba(255,255,255,0.04); }
    /* Horizontal scroll containers */
    [data-horizontal-scroll], div[style*="overflow-x"] {
      -webkit-overflow-scrolling: touch;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Color+Emoji&display=block" rel="stylesheet">
  <style>
    /* Force emoji rendering with system emoji font stack */
    * { font-variant-emoji: emoji; }
    .emoji-text {
      font-family: 'Noto Color Emoji', 'Apple Color Emoji', 'Segoe UI Emoji', 'Android Emoji', sans-serif !important;
    }
  </style>
</head>
<body>
  <noscript><p style="color:#fff;padding:20px;text-align:center">Please enable JavaScript to use Photo Healthy.</p></noscript>
  <div id="root"></div>
</body>
</html>
