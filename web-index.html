<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <meta name="theme-color" content="#202333" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Photo Healthy — Capture, Share, Thrive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html {
      height: auto;
      min-height: 100%;
    }
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: #202333;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      /* Prevent horizontal scroll */
      overflow-x: hidden;
    }
    #root {
      display: flex;
      flex-direction: column;
      width: 100%;
      min-width: 0;
      height: 100vh;
      height: -webkit-fill-available;
      height: 100dvh;
      overflow: hidden;
      position: relative;
    }
    /* ===== iOS SCROLL FIX =====
       React Navigation creates nested overflow:hidden containers that trap scroll.
       We target the INNER screen content wrapper only - not the nav chrome.
       The strategy: nav bars stay fixed, content area gets -webkit-overflow-scrolling. 
    */
    /* Allow the main scroll container inside each screen to scroll on iOS */
    #root * {
      -webkit-overflow-scrolling: touch;
    }
    /* The stack card itself - make it fill height and allow its children to scroll */
    #root > div > div > div[data-focusable] {
      height: 100% !important;
      overflow: hidden !important;
    }
    /* Prevent tap highlight on mobile */
    * { -webkit-tap-highlight-color: transparent; }
    /* Ensure text doesn't get too small on mobile */
    @media (max-width: 480px) {
      html { font-size: 16px; }
    }
    /* Scrollable horizontal lists look better on touch */
    [data-horizontal-scroll] {
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
    }
  </style>
</head>
<body>
  <noscript><p style="color:#fff;padding:20px;text-align:center">Please enable JavaScript to use Photo Healthy.</p></noscript>
  <div id="root"></div>
</body>
</html>
